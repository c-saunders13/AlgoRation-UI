@if (open()) {
  <div
    class="modal-backdrop"
    tabindex="0"
    (click)="onBackdropClick($event)"
    (keydown.enter)="onBackdropClick($event)"
    (keydown.space)="onBackdropClick($event)"
  >
    <section class="modal" role="dialog" aria-modal="true" [attr.aria-label]="title() || 'Dialog'">
      <header class="modal__header">
        <h2>{{ title() }}</h2>
        <button type="button" class="modal__close" (click)="close()" aria-label="Close dialog">
          ×
        </button>
      </header>

      <div class="modal__body">
        <ng-content select="[modal-body]" />
      </div>

      <footer class="modal__footer">
        <ng-content select="[modal-footer]" />
      </footer>
    </section>
  </div>
}
