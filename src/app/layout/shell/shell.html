<div class="shell">
  <header class="shell__header">
    <a class="shell__brand" routerLink="/">
      <span class="shell__brand-mark"><span>A</span><span class="shell__brand-highlight">R</span></span>
      <span>
        <strong>Algo<span class="shell__brand-highlight">Ration</span></strong>
        <small></small>
      </span>
    </a>

    <nav class="shell__nav" aria-label="Primary">
      @for (item of navigation; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  </header>

  <main class="shell__content">
    <router-outlet />
  </main>

  <footer class="shell__footer">
    Maximizing Meals Since 2026
  </footer>
</div>
